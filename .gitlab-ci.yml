image: golang:latest

variables:
  REPO_NAME: github.com/devnull-tools/sherlog-holmes

before_script:
  - mkdir -p $GOPATH/src/$(dirname $REPO_NAME)
  - ln -svf $CI_PROJECT_DIR $GOPATH/src/$REPO_NAME
  - cd $GOPATH/src/$REPO_NAME
  - mkdir $CI_PROJECT_DIR/bin
  - curl http://racha-cuca.devnull.tools/bin/notify > $CI_PROJECT_DIR/bin/notify
  - chmod +x $CI_PROJECT_DIR/bin/notify
  - alias notify="$CI_PROJECT_DIR/bin/notify \"Sherlog-Holmes :: $CI_COMMIT_REF_NAME\""

after_script:
  - notify "$CI_JOB_STAGE :: $CI_JOB_NAME"

stages:
  - test
  - build
  - release

go:test:
  stage: test
  script:
    - go get ./...
    - go vet ./...
    - go test -race ./...

go:build:macos:amd64:
  stage: build
  script:
    - mkdir -p $CI_PROJECT_DIR/bin/macos/amd64
    - go get ./...
    - GOOS=darwin GOARCH=amd64 go build -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/bin/macos/amd64/sherlog-holmes
  artifacts:
    expire_in: 2 days
    paths:
      - bin/macos/amd64/sherlog-holmes

go:build:linux:amd64:
  stage: build
  script:
    - mkdir -p $CI_PROJECT_DIR/bin/linux/amd64
    - go get ./...
    - GOOS=linux GOARCH=amd64 go build -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/bin/linux/amd64/sherlog-holmes
  artifacts:
    expire_in: 2 days
    paths:
      - bin/linux/amd64/sherlog-holmes

go:build:windows:amd64:
  stage: build
  script:
    - mkdir -p $CI_PROJECT_DIR/bin/windows/amd64
    - go get ./...
    - GOOS=windows GOARCH=amd64 go build -ldflags "-extldflags '-static'" -o $CI_PROJECT_DIR/bin/windows/amd64/sherlog-holmes
  artifacts:
    expire_in: 2 days
    paths:
      - bin/windows/amd64/sherlog-holmes

nexus:release:
  stage: release
  dependencies:
    - go:build:macos:amd64
    - go:build:linux:amd64
    - go:build:windows:amd64
  script:
    - curl -v -u $NEXUS_AUTH --upload-file $CI_PROJECT_DIR/bin/windows/amd64/sherlog-holmes $NEXUS_URL/$NEXUS_REPO/$CI_COMMIT_REF_SLUG/windows/amd64/sherlog-holmes
    - curl -v -u $NEXUS_AUTH --upload-file $CI_PROJECT_DIR/bin/linux/amd64/sherlog-holmes $NEXUS_URL/$NEXUS_REPO/$CI_COMMIT_REF_SLUG/linux/amd64/sherlog-holmes
    - curl -v -u $NEXUS_AUTH --upload-file $CI_PROJECT_DIR/bin/macos/amd64/sherlog-holmes $NEXUS_URL/$NEXUS_REPO/$CI_COMMIT_REF_SLUG/macos/amd64/sherlog-holmes
